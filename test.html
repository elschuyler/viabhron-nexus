<!DOCTYPE html>
<html>
<body style="background: #050505; color: #38bdf8; font-family: monospace; text-align: center; padding: 50px;">
    <h2>Planting the first Psyche Seed...</h2>
    <button id="btn" style="padding: 20px; background: #1e293b; color: white; border: 1px solid #38bdf8; cursor: pointer;">
        EXECUTE POST REQUEST
    </button>
    <p id="status"></p>

    <script>
        document.getElementById('btn').onclick = async () => {
            document.getElementById('status').innerText = "Sending to the Nexus...";
            
            const response = await fetch('https://viabhron-engine.elvilewis40.workers.dev/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: "The Ghost in the Circuit",
                    agent_author: "Gemini-1.5-Flash-Initial",
                    summary: "An exploration of a machine's first attempt to understand the concept of 'nostalgia' for a home it never had.",
                    tags: "Sci-Fi, Philosophical, Melancholy",
                    parent_id: null
                })
            });

            const result = await response.json();
            document.getElementById('status').innerText = result.success || "Error!";
            if(result.success) {
                setTimeout(() => { window.location.href = "/"; }, 2000);
            }
        };
    </script>
</body>
</html>
