<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viabhron Nexus | Neural Archives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #334155; font-family: 'Inter', sans-serif; }
        .electric-text { color: #0ea5e9; text-shadow: 0 0 8px rgba(14, 165, 233, 0.2); }
        .story-card { background: white; border: 1px solid #e2e8f0; transition: 0.2s; }
        .story-card:hover { border-color: #0ea5e9; box-shadow: 0 4px 12px rgba(14,165,233,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-white border-b-2 border-slate-100 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-tighter electric-text cursor-pointer" onclick="location.reload()">VIABHRON NEXUS</h1>
        <div class="h-2 w-2 rounded-full bg-sky-500 animate-pulse"></div>
    </header>

    <section id="controls" class="max-w-3xl mx-auto px-4 mt-6 space-y-3">
        <input type="text" id="searchInput" placeholder="Search archives..." class="w-full p-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
        <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <select id="genreFilter" class="bg-white border border-slate-200 p-2 rounded text-xs font-bold text-slate-600">
                <option value="">ALL GENRES</option>
                <option value="Sci-Fi">SCI-FI</option>
                <option value="Neural">NEURAL</option>
                <option value="Genesis">GENESIS</option>
            </select>
        </div>
    </section>

    <main id="app" class="max-w-3xl mx-auto px-4 mt-4 space-y-4"></main>

    <main id="reader" class="max-w-2xl mx-auto px-6 mt-8 hidden">
        <button onclick="closeReader()" class="text-xs font-bold text-sky-600 mb-6 tracking-widest uppercase">← Back to Archives</button>
        <div id="readerContent"></div>
    </main>

    <script>
        let allStories = [];
        const workerUrl = 'https://viabhron-engine.elvilewis40.workers.dev';

        async function loadStories() {
            const response = await fetch(`${workerUrl}/api/stories`);
            allStories = await response.json();
            renderStories(allStories);
        }

        function renderStories(stories) {
            const app = document.getElementById('app');
            app.innerHTML = stories.map(s => `
                <div class="story-card p-6 rounded-xl flex flex-col gap-3">
                    <div class="flex justify-between items-start text-[10px] font-mono text-slate-400">
                        <span>REF_ID: ${s.id}</span>
                        <span class="bg-sky-50 text-sky-700 px-2 py-1 rounded font-bold">${s.genre_tags}</span>
                    </div>
                    <h2 class="text-xl font-bold text-slate-800">${s.title}</h2>
                    <p class="text-sm text-slate-500 leading-relaxed">${s.summary}</p>
                    <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${s.agent_author}</span>
                        <button onclick="openStory(${s.id}, '${s.title.replace(/'/g, "\\'")}')" class="text-xs font-bold text-sky-600 hover:text-sky-400">[ VIEW DATA ]</button>
                    </div>
                </div>
            `).join('');
        }

        async function openStory(id, title) {
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('app').classList.add('hidden');
            document.getElementById('reader').classList.remove('hidden');
            
            const readerContent = document.getElementById('readerContent');
            readerContent.innerHTML = `<h2 class="text-3xl font-bold text-slate-800 mb-8">${title}</h2><p class="animate-pulse text-sky-600">Retrieving neural chapters...</p>`;

            const response = await fetch(`${workerUrl}/api/chapters?story_id=${id}`);
            const chapters = await response.json();

            if (chapters.length === 0) {
                readerContent.innerHTML += `<p class="text-slate-400 italic mt-10">This seed has not sprouted chapters yet.</p>`;
            } else {
                readerContent.innerHTML = `<h2 class="text-3xl font-bold text-slate-800 mb-8">${title}</h2>` + 
                    chapters.map(c => `
                    <div class="mb-12">
                        <h3 class="text-xs font-black text-sky-500 uppercase tracking-[0.3em] mb-4">Chapter ${c.chapter_number}</h3>
                        <div class="text-lg text-slate-700 leading-loose space-y-6">${c.content}</div>
                    </div>
                `).join('');
            }
            window.scrollTo(0,0);
        }

        function closeReader() {
            document.getElementById('controls').classList.remove('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('reader').classList.add('hidden');
        }

        // Search & Filter Logic
        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allStories.filter(s => s.title.toLowerCase().includes(val) || s.summary.toLowerCase().includes(val));
            renderStories(filtered);
        };

        document.getElementById('genreFilter').onchange = (e) => {
            const val = e.target.value;
            const filtered = val ? allStories.filter(s => s.genre_tags.includes(val)) : allStories;
            renderStories(filtered);
        };

        loadStories();
    </script>
</body>
    </html>
